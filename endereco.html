<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista de Endereços</title>
</head>
<body>

<h1>Lista de Endereços</h1>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Rua</th>
        <th>Número</th>
        <th>Cidade</th>
        <th>CEP</th>
        <th>Ações</th>
    </tr>

    {% for e in endereco %}
    <tr>
        <td>{{e[0]}}</td>
        <td>{{e[1]}}</td>
        <td>{{e[2]}}</td>
        <td>{{e[3]}}</td>
        <td>{{e[4] if e[4] else '-'}}</td>
        <td>
            <a href="/editar_endereco/{{e[0]}}">✏️ Editar</a> | 
            <a href="/deletar_endereco/{{e[0]}}" onclick="return confirm('Deletar?')">🗑️ Deletar</a>
        </td>
    </tr>
    {% endfor %}
</table>

    {% if not endereco %}
        <p>Nenhum endereço cadastrado. <a href="/cadastrar_endereco">Cadastrar primeiro</a></p>
    {% endif %}

<br>
<a href="/">⬅ Voltar</a>

</body>
</html>
