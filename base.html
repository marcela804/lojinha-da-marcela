<!DOCTYPE html>
<!-- Documento HTML5 -->

<head>
    <!-- Cabeçalho da página -->

    <meta charset="UTF-8">
    <!-- Permite caracteres com acento -->

    <title>Lojinha da Marcela</title>
    <!-- Título padrão da aba -->

    <style>
        /* CSS global que será herdado pelas páginas que usam este base.html */

        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        .flash {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }

        table, th, td {
            border: 1px solid #999;
            padding: 8px;
        }

        a {
            text-decoration: none;
            margin-right: 10px;
        }

        input {
            margin-bottom: 10px;
            padding: 6px;
            width: 300px;
        }

        button {
            padding: 8px 15px;
        }
    </style>
</head>

<body>
    <!-- Corpo da página -->

    {% with messages = get_flashed_messages(with_categories=true) %}
    <!-- Pega mensagens flash do Flask -->

        {% if messages %}
        <!-- Se existirem mensagens -->

            {% for categoria, mensagem in messages %}
            <!-- Percorre cada mensagem -->

                <div class="flash {{ categoria }}">
                    {{ mensagem }}
                </div>
                <!-- Exibe a mensagem -->

            {% endfor %}

        {% endif %}

    {% endwith %}

    {% block conteudo %}{% endblock %}
    <!--
        Este é um bloco do Jinja2
        As páginas que usam:
        {% extends "base.html" %}
        colocam aqui dentro o conteúdo específico
    -->

</body>
</html>
