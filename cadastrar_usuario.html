<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Usuário</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0 15px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
        .eye { position: relative; }
        .eye-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; }
        .flash { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .error { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>

    <h1>Cadastrar Usuário</h1>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <label>Nome:</label>
        <input type="text" name="nome" required>

        <label>Email:</label>
        <input type="email" name="email" required>

        <label>Senha:</label>
        <div class="eye">
            <input type="password" name="senha" id="senha" required>
            <span class="eye-icon" onclick="togglePassword('senha')">👁</span>
        </div>

        <label>Confirmar Senha:</label>
        <div class="eye">
            <input type="password" name="confirmar_senha" id="confirmar" required>
            <span class="eye-icon" onclick="togglePassword('confirmar')">👁</span>
        </div>

        <button type="submit">Cadastrar</button>
    </form>

    <br>
    <a href="/login">Já tenho conta</a>

    <script>
        function togglePassword(id) {
            const pwd = document.getElementById(id);
            const icon = event.target;
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.textContent = '🙈';
            } else {
                pwd.type = 'password';
                icon.textContent = '👁';
            }
        }
    </script>

</body>
</html>
