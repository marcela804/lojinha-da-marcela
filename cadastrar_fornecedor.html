<!DOCTYPE html>
<!-- Informa que o documento está em HTML5 -->

<head>
    <!-- Cabeçalho da página -->

    <meta charset="UTF-8">
    <!-- Permite uso de acentos e caracteres especiais -->

    <title>Cadastrar Fornecedor</title>
    <!-- Título da aba do navegador -->
</head>

<body>
    <!-- Corpo visível da página -->

    <h1>Cadastrar Fornecedor</h1>
    <!-- Título principal -->

    <form action="/cadastrar_fornecedor" method="POST">
    <!--
        Envia os dados do formulário para a rota Flask /cadastrar_fornecedor
        method="POST" = envio de formulário
    -->

        Nome:<br>
        <input type="text" name="nome" required><br><br>
        <!-- Campo nome -->

        CNPJ:<br>
        <input type="text" name="cnpj" required><br><br>
        <!-- Campo CNPJ -->

        Quantidade:<br>
        <input type="number" name="quantidade" required><br><br>
        <!--
            type="number" = só aceita números
            ideal para quantidade
        -->

        Preço:<br>
        <input type="number" step="0.01" name="preco" required><br><br>
        <!--
            step="0.01" = permite casas decimais
            útil para preço, ex: 19.90
        -->

        Rua:<br>
        <input type="text" name="rua" required><br><br>
        <!-- Campo rua -->

        Número:<br>
        <input type="text" name="numero" required><br><br>
        <!-- Campo número -->

        Cidade:<br>
        <input type="text" name="cidade" required><br><br>
        <!-- Campo cidade -->

        <button type="submit">Salvar</button>
        <!-- Botão que envia o formulário -->

    </form>
    <!-- Fim do formulário -->

    <br>

    <a href="/">⬅ Voltar</a>
    <!-- Link para voltar à página inicial -->

</body>
</html>
